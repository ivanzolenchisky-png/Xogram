name: Android CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Init Android Project
      run: |
        if [ ! -f build.gradle ]; then
          echo "plugins { id 'com.android.application' version '8.1.1' apply false }" > build.gradle
          echo "include ':app'" > settings.gradle
          mkdir -p app
          echo "plugins { id 'com.android.application' }; android { compileSdk 34; namespace 'com.example.xogram' }" > app/build.gradle
        fi

    - name: Build APK
      run: gradle assembleDebug --continue || true

    - name: Upload Anything
      uses: actions/upload-artifact@v4
      with:
        name: xoGram-files
        path: |
          **/*.apk
          **/*.kt
